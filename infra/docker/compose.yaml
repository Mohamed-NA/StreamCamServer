services:
  models:
    image: ${MODELS_IMAGE:-streamcamserver-models:local}
    restart: "no"
    volumes:
      - models-data:/shared-models

  app:
    image: ${APP_IMAGE:-streamcamserver-app:local}
    depends_on:
      models:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - models-data:/app/model:ro

volumes:
  models-data:
