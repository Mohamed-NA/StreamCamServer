name: Test and Publish Images

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to download the model bundle from before building the models image"
        required: false
        type: string

env:
  APP_IMAGE_NAME: streamcamserver-app
  MODELS_IMAGE_NAME: streamcamserver-models
  MODEL_BUNDLE_NAME: model-bundle.tar.gz

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Smoke test application import
        run: |
          uv run python -m compileall scripts streamcamserver
          uv run python - <<'PY'
          from streamcamserver.app import app, socketio, model_mgr

          assert app is not None
          assert socketio is not None
          assert model_mgr.list_models()
          print("Smoke test passed")
          PY

      - name: Build app image
        run: docker build -f infra/docker/Dockerfile.app -t streamcamserver-app:test .

  build-and-push-app:
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract app image metadata
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.app
          push: true
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}

  build-and-push-models:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download model bundle from GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          mkdir -p dist
          gh release download "$RELEASE_TAG" \
            --pattern "model-bundle.tar.gz" \
            --pattern "model-bundle.tar.gz.sha256" \
            --dir dist
          sha256sum -c dist/model-bundle.tar.gz.sha256

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract models image metadata
        id: meta_models
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.MODELS_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=raw,value=${{ inputs.release_tag }}

      - name: Build and push models image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.models
          push: true
          tags: ${{ steps.meta_models.outputs.tags }}
          labels: ${{ steps.meta_models.outputs.labels }}
