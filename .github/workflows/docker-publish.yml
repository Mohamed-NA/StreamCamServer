name: Test and Publish Docker Images

on:
  pull_request:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  APP_IMAGE_NAME: streamcamserver-app
  MODELS_IMAGE_NAME: streamcamserver-models

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Smoke test application import
        run: |
          uv run python -m compileall server.py model_manager.py
          uv run python - <<'PY'
          import server

          assert server.app is not None
          assert server.socketio is not None
          print('Smoke test passed')
          PY

      - name: Build app image
        run: docker build -t streamcamserver-app:test .

      - name: Build models image
        run: docker build -f Dockerfile.models -t streamcamserver-models:test .

      - name: Smoke test composed containers
        env:
          APP_IMAGE: streamcamserver-app:test
          MODELS_IMAGE: streamcamserver-models:test
        run: |
          set -e
          docker compose up -d

          for i in {1..30}; do
            if curl -kfsS https://127.0.0.1:8080 > /dev/null; then
              echo "Compose smoke test passed"
              docker compose logs app
              exit 0
            fi
            sleep 2
          done

          echo "Compose smoke test failed"
          docker compose logs
          exit 1

      - name: Cleanup smoke test stack
        if: always()
        run: docker compose down -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Buildx enables the docker/build-push-action step to perform the image build.
      # The Dockerfile is taken from the repository root by default.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # This authenticates the runner with Docker Hub so a later step can push the image.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract app image metadata
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Extract models image metadata
        id: meta_models
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.MODELS_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}

      - name: Build and push models image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.models
          push: true
          tags: ${{ steps.meta_models.outputs.tags }}
          labels: ${{ steps.meta_models.outputs.labels }}

      - name: Verify published Docker images together
        env:
          APP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_IMAGE_NAME }}:latest
          MODELS_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.MODELS_IMAGE_NAME }}:latest
        run: |
          set -e
          docker pull "$APP_IMAGE"
          docker pull "$MODELS_IMAGE"
          docker compose up -d

          for i in {1..30}; do
            if curl -kfsS https://127.0.0.1:8080 > /dev/null; then
              echo "Published image health check passed"
              docker compose logs app
              exit 0
            fi
            sleep 2
          done

          echo "Published image health check failed"
          docker compose logs
          exit 1

      - name: Cleanup published image stack
        if: always()
        run: docker compose down -v
