name: Test and Publish Docker Image

on:
  pull_request:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  IMAGE_NAME: streamcamserver

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test application import
        run: |
          python -m compileall server.py
          python - <<'PY'
          import server

          assert server.app is not None
          assert server.socketio is not None
          print('Smoke test passed')
          PY

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Buildx enables the docker/build-push-action step to perform the image build.
      # The Dockerfile is taken from the repository root by default.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # This authenticates the runner with Docker Hub so a later step can push the image.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # This step does not build anything.
      # It generates Docker image metadata that later steps reuse, including:
      # - the full image name: <dockerhub-username>/streamcamserver
      # - the tag list: currently just "latest"
      # - standard OCI labels attached to the image
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      # This is the step that actually builds and pushes the Docker image.
      # - context: . tells Docker to build from the repository root
      # - the default Dockerfile path is ./Dockerfile
      # - tags comes from the metadata step above
      # - push: true uploads the built image to Docker Hub using the login from earlier
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Validate the published image by pulling it from Docker Hub,
      # starting a container, and checking the HTTPS endpoint.
      - name: Verify published Docker image
        run: |
          set -e
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          docker pull "$IMAGE"
          docker run -d --name streamcamserver-ci -p 5000:5000 "$IMAGE"

          for i in {1..20}; do
            if curl -kfsS https://127.0.0.1:5000 > /dev/null; then
              echo "Published image health check passed"
              docker logs streamcamserver-ci
              exit 0
            fi
            sleep 2
          done

          echo "Published image health check failed"
          docker logs streamcamserver-ci
          exit 1

      - name: Cleanup test container
        if: always()
        run: docker rm -f streamcamserver-ci || true